services:
  yocota:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - /var/www/yocota:/usr/share/nginx/html:ro
      - /docker/yocota/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      # Router HTTP (www redirect + main)
      - "traefik.http.routers.yocota-http.rule=Host(`yocota.com`) || Host(`www.yocota.com`)"
      - "traefik.http.routers.yocota-http.entrypoints=web"
      # Router HTTPS
      - "traefik.http.routers.yocota.rule=Host(`yocota.com`) || Host(`www.yocota.com`)"
      - "traefik.http.routers.yocota.entrypoints=websecure"
      - "traefik.http.routers.yocota.tls=true"
      - "traefik.http.routers.yocota.tls.certresolver=letsencrypt"
      # www → yocota.com redirect middleware
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.yocota\\.com(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://yocota.com$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.yocota.middlewares=www-redirect"
      # Port
      - "traefik.http.services.yocota.loadbalancer.server.port=80"
